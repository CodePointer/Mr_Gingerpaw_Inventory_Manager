# .github/workflows/deploy-backend.yml

name: Build and Deploy backend to Azure Functions

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PATH: './backend'

permissions:
  id-token: write # Required for requesting the JWT
  contents: read # Required for actions/checkout

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_971E7BAC292B4DDB875E14AFE2227C56 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BC6EB86382884CF7A6EA6A40410ADAD0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5811073024354975BB73EF34F5776418 }}
                
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'gingerpaw-backend'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PATH }}
          enable-oryx-build: true
